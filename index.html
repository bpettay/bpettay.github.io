<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Brock | Engineering</title>

  <!-- Favicon (ROOT LEVEL) -->
  <link rel="icon" type="image/png" href="./Favicon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>

  <!-- ================= NAV ================= -->
  <nav class="nav">
    <div class="nav-left">
      <img src="./assets/img/bp-monogram.png" alt="logo" class="logo">
      <span>Brock</span>
    </div>

    <div class="nav-right">
      <button class="nav-link active" data-page="home">Home</button>
      <button class="nav-link" data-page="tools">Tools</button>
    </div>
  </nav>

  <!-- ================= HOME ================= -->
  <main id="home" class="page active">
    <section class="hero">
      <h1>Engineering. Simple.</h1>
      <p>
        A clean workspace for practical tools, quick calculations,
        and real-world engineering use.
      </p>
    </section>
  </main>

  <!-- ================= TOOLS ================= -->
  <main id="tools" class="page">
    <section class="tool">
      <h2>Unit Converter</h2>

      <div class="tool-row">
        <select id="category"></select>
      </div>

      <div class="tool-row">
        <input id="inputValue" type="number" value="1" />

        <select id="fromUnit"></select>
        <span>→</span>
        <select id="toUnit"></select>
      </div>

      <div class="result">
        <p id="resultValue">—</p>
      </div>
    </section>
  </main>

  <!-- JS -->
  <script src="./script.js"></script>
</body>
</html>
